# ────────────────────────────────────────────────────────────
#  Docker Compose – Pitz Challenge
#  Services: db (PostgreSQL), backend (Rails), frontend (React)
# ────────────────────────────────────────────────────────────
#
#  Usage:
#    docker compose up --build           # Build and start all services
#    docker compose up --build backend   # Build and start only backend + db
#    docker compose up --build frontend  # Build and start only frontend
#    docker compose down                 # Stop and remove containers
#    docker compose down -v              # Also remove volumes (wipes DB data)
#

services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-backend_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # Expose on 5433 to avoid conflict with local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Rails API Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pitz-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-backend_development}
      RAILS_LOG_TO_STDOUT: "true"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the built JS bundle to the backend API
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
    image: pitz-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

# ── Named Volumes ─────────────────────────────────────────
volumes:
  postgres_data:
