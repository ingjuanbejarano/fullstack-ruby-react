---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/products":
    get:
      summary: List products
      tags:
      - Products
      parameters:
      - name: search
        in: query
        description: Filter products by name
        required: false
        schema:
          type: string
      - name: status
        in: query
        description: Filter by active status (true/false)
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        description: Items per page
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
                          properties:
                            name:
                              type: string
                            description:
                              type: string
                              nullable: true
                            price:
                              type: string
                            stock:
                              type: integer
                            sku:
                              type: string
                            active:
                              type: boolean
                            created_at:
                              type: string
                            updated_at:
                              type: string
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
    post:
      summary: Create a product
      tags:
      - Products
      parameters: []
      responses:
        '201':
          description: product created
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    price:
                      type: number
                    stock:
                      type: integer
                    sku:
                      type: string
                    active:
                      type: boolean
                  required:
                  - name
                  - price
                  - stock
                  - sku
  "/api/v1/products/{id}":
    parameters:
    - name: id
      in: path
      description: id
      required: true
      schema:
        type: string
    get:
      summary: Show a product
      tags:
      - Products
      responses:
        '200':
          description: successful
        '404':
          description: product not found
    put:
      summary: Update a product
      tags:
      - Products
      parameters: []
      responses:
        '200':
          description: successful
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    price:
                      type: number
                    stock:
                      type: integer
                    sku:
                      type: string
                    active:
                      type: boolean
    delete:
      summary: Delete a product
      tags:
      - Products
      responses:
        '204':
          description: successful
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
